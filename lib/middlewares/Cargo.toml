[package]
name = "wasmer-middlewares"
description = "A collection of various useful middlewares"
categories = ["wasm"]
keywords = ["webassembly", "wasm"]
readme = "README.md"
authors.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
wasmer = { workspace = true, default-features = false, features = [
	"compiler",
	"wasmparser",
] }
wasmer-types = { workspace = true, default-features = true }
wasmer-vm.workspace = true

[dev-dependencies]
wasmer = { workspace = true, features = [
	"compiler",
	"wasmparser",
] }

[badges]
maintenance = { status = "actively-developed" }

[package.metadata.docs.rs]
rustc-args = ["--cfg", "docsrs"]
