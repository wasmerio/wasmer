[package]
name = "wasmer-bin-fuzz"
version = "0.0.0"
authors = ["Automatically generated"]
publish = false
edition.workspace = true

[package.metadata]
cargo-fuzz = true

[dependencies]
anyhow.workspace = true
wasm-smith.workspace = true
libfuzzer-sys.workspace = true
wasmer = { path = "../lib/api" }
wasmer-compiler-cranelift = { path = "../lib/compiler-cranelift", optional = true }
wasmer-compiler-llvm = { path = "../lib/compiler-llvm", optional = true }
wasmer-compiler-singlepass = { path = "../lib/compiler-singlepass", optional = true }
wasmer-compiler = { path = "../lib/compiler" }
wasmer-middlewares = { path = "../lib/middlewares" }
wasmprinter.workspace = true

[features]
cranelift = [ "wasmer-compiler-cranelift" ]
llvm = [ "wasmer-compiler-llvm" ]
singlepass = [ "wasmer-compiler-singlepass" ]
wasmer-artifact-load = ["wasmer-compiler/wasmer-artifact-load"]
wasmer-artifact-create = ["wasmer-compiler/wasmer-artifact-create"]
static-artifact-load = ["wasmer-compiler/static-artifact-load"]
static-artifact-create = ["wasmer-compiler/static-artifact-create"]

[[bin]]
name = "equivalence"
path = "fuzz_targets/equivalence.rs"
test = false

[[bin]]
name = "cranelift"
path = "fuzz_targets/cranelift.rs"
required-features = ["cranelift"]
test = false

[[bin]]
name = "llvm"
path = "fuzz_targets/llvm.rs"
required-features = ["llvm"]
test = false

[[bin]]
name = "singlepass"
path = "fuzz_targets/singlepass.rs"
required-features = ["singlepass"]
test = false

[[bin]]
name = "metering"
path = "fuzz_targets/metering.rs"
required-features = ["cranelift"]
test = false

[[bin]]
name = "deterministic"
path = "fuzz_targets/deterministic.rs"
required-features = ["cranelift", "llvm", "singlepass"]
test = false
