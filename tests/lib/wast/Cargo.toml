[package]
name = "wasmer-wast"
description = "wast testing support for wasmer"
version.workspace = true
authors.workspace = true
license = "MIT OR Apache-2.0 WITH LLVM-exception"
categories = ["wasm"]
keywords = ["wasm", "webassembly"]
repository = "https://github.com/wasmerio/wasmer"
readme = "README.md"
edition.workspace = true

[dependencies]
wasmer-types = { workspace = true, default-features = true }
wasmer-wasix = { workspace = true, default-features = true }
wasmer = { workspace = true, default-features = false }
virtual-fs.workspace = true

anyhow.workspace = true
wast.workspace = true
serde.workspace = true
tempfile.workspace = true
thiserror.workspace = true
futures.workspace = true
tokio = { workspace = true, features = [
	"io-util",
	"rt",
], default-features = false }
fs_extra.workspace = true

[features]
default = ["wat"]
wat = ["wasmer/wat"]

[badges]
maintenance = { status = "actively-developed" }
